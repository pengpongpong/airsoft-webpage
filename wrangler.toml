# Cloudflare Pages / Workers config for Astro
name = "airsoft-webpage"
compatibility_date = "2024-09-01"
pages_build_output_dir = "dist"

# KV namespace for Astro sessions - create first, then add ID below
# 1. Run: npx wrangler kv namespace create SESSION
# 2. Or: Dashboard > Workers & Pages > KV > Create namespace (name: SESSION)
# 3. Replace the id below with your namespace ID (32-char hex string)
[[kv_namespaces]]
binding = "SESSION"
id = "46f0e5f4a2e5494cb51e0c8326c673bd"
