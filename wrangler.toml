# Cloudflare Pages / Workers config for Astro
name = "airsoft-webpage"
compatibility_date = "2024-09-01"
pages_build_output_dir = "dist"

# Required: Create KV namespace first, then add the ID here
# Run: npx wrangler kv namespace create SESSION
# Or create in Cloudflare Dashboard: Workers & Pages > KV > Create namespace
[[kv_namespaces]]
binding = "SESSION"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
